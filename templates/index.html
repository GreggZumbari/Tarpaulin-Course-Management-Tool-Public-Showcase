<html>

<head>
    <title>Gregg's Great REST API with JWTs Implementation</title>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <link type="text/css" rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>Gregg's Tarpaulin Course Management Tool Implementation</h1>

    <p>To use this app, please send a POST request to /users/login, and include a response body with the following JSON format:</p>
    <p>{ "username": "your email@domain.com", "password": "your password" }</p>
    <p>Alternatively, you can use the fields below:</p>

    <!-- Code adapted from https://github.com/cyber330d/cmedia-hub-server/blob/3cb567a00bd5a58d19584aae6664751c48abf2cf/cmedia-hub-node-api/src/api/routes/usersRoutes.js -->
    <form id="login-form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button type="submit">Login</button>
    </form>
</body>

</html>
